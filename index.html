<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Poster</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; }
      #image-popup-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }
      #popup-image {
        max-width: 90%; max-height: 90%;
        object-fit: contain;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        border-radius: 8px;
      }
    </style>

    <script>
      AFRAME.registerComponent('popup-on-click', {
        init: function () {
          const el = this.el;
          const overlay = document.querySelector('#image-popup-overlay');
          const popupImg = document.querySelector('#popup-image');
          el.addEventListener('click', function () {
            const assetId = el.getAttribute('src');
            const assetEl = document.querySelector(assetId);
            if (assetEl) {
              popupImg.src = assetEl.getAttribute('src');
              overlay.style.display = 'flex';
            }
          });
        }
      });
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelector('#image-popup-overlay').addEventListener('click', function () {
          this.style.display = 'none';
          document.querySelector('#popup-image').src = '';
        });
      });
    </script>
  </head>
  <body>
    <div id="image-popup-overlay">
      <img id="popup-image" src="" alt="Enlarged Info" />
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 1e-11; warmupTolerance: 1"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="asset-0" src="assets/images/Screenshot 2026-04-08 131748.png" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="near: 0; far: 10000; objects: .clickable">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane class="clickable" popup-on-click src="#asset-0" width="1" height="1" position="0 0 0" rotation="0 0 0" scale="1 1 1" material="transparent: true; alphaTest: 0.01"></a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>
